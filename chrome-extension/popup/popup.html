<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sense Collector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container" id="app">
    <!-- Loading State -->
    <div id="loading" class="view active">
      <div class="logo-section">
        <div class="logo">S</div>
        <h1>Sense</h1>
      </div>
      <p class="loading-text">Loading...</p>
    </div>

    <!-- Login View -->
    <div id="login-view" class="view">
      <div class="logo-section">
        <div class="logo">S</div>
        <h1>Sense</h1>
        <p class="tagline">Your learning journey, visualized</p>
      </div>
      
      <form id="auth-form" class="auth-form">
        <div class="form-group">
          <input type="email" id="email" placeholder="Email" required autocomplete="email">
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <div id="auth-error" class="error-message"></div>
        <button type="submit" id="login-btn" class="btn btn-primary">Sign In</button>
        <button type="button" id="signup-btn" class="btn btn-secondary">Create Account</button>
      </form>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view">
      <div class="header">
        <div class="header-left">
          <div class="logo-small">S</div>
          <span class="brand-name">Sense</span>
        </div>
        <button id="logout-btn" class="btn-icon" title="Sign Out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="user-section">
        <p class="user-email" id="user-email">user@example.com</p>
      </div>

      <div class="status-card">
        <div class="status-header">
          <span class="status-label">Collection Status</span>
          <div class="toggle-container">
            <input type="checkbox" id="collection-toggle" class="toggle">
            <label for="collection-toggle" class="toggle-label"></label>
          </div>
        </div>
        <p class="status-description" id="status-description">
          Capturing browsing topics to fuel your Sense graph.
        </p>
      </div>

      <div class="stats-card">
        <div class="stat">
          <span class="stat-value" id="total-events">0</span>
          <span class="stat-label">Pages Captured</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="last-sync">Never</span>
          <span class="stat-label">Last Sync</span>
        </div>
      </div>

      <div class="actions">
        <button id="sync-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Sync Now
        </button>
        <button id="open-app-btn" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="4"/>
            <line x1="21.17" y1="8" x2="12" y2="8"/>
            <line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
            <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
          </svg>
          Open Sense App
        </button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
